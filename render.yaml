services:
  - type: web
    name: hirex
    env: node
    plan: free
    buildCommand: npm run install-all && npm run build-frontend
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        value: hirex123
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
